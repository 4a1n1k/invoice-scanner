version: '3.8'

services:
  invoice-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: invoice-scanner:latest
    container_name: invoice-scanner
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      - invoice_storage:/app/storage
      - invoice_db:/app/prisma
    environment:
      NODE_ENV: production
      PORT: "3005"
      DATABASE_URL: "file:/app/prisma/dev.db"

      # Auth
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-http://116.203.149.15:3005}"
      AUTH_TRUST_HOST: "true"

      # AI services (on the host machine)
      OCR_API_URL: "${OCR_API_URL:-http://host.docker.internal:5050/ocr/file}"
      LLM_API_URL: "${LLM_API_URL:-http://host.docker.internal:11434/api/generate}"
      LLM_MODEL:   "${LLM_MODEL:-qwen2.5:3b}"
      LLM_MAX_CHARS: "${LLM_MAX_CHARS:-4000}"
      AI_TIMEOUT_MS: "${AI_TIMEOUT_MS:-55000}"

      STORAGE_ROOT: "storage/expenses"

      # Internal API (for home-manager integration)
      INTERNAL_API_KEY: "${INTERNAL_API_KEY}"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  invoice_storage:
    name: invoice-scanner_storage
  invoice_db:
    name: invoice-scanner_db
